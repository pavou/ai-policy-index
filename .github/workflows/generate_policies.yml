name: Generate Policies

on:
  push:
    branches: [main]
    paths:
      - 'data/projects.csv'
  schedule:
    - cron: '0 3 * * 1'           # every Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate policies.json
        working-directory: .github/scripts
        env:
          AZURE_OPENAI_ENDPOINT:   ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY:    ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          RESCAN_DAYS:             ${{ vars.RESCAN_DAYS }}
        run: python generate_policies.py ${RESCAN_DAYS:+--rescan-days "$RESCAN_DAYS"}

      - name: Commit updated policies.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/policies.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore: refresh policies.json ($(date -u +%Y-%m-%d))"
          git push origin main
